---
config:
  boot.autostart: "true"

  user.user-data: |
    #cloud-config

    package_update: true
    package_upgrade: true

    groups:
      - workshop_grp

    packages:
      - openssh-server
      - curl
      - wget
      - acl # Required for your setfacl operations
      - ca-certificates # CRITICAL: Forces Ubuntu to verify SSL paths properly
      - ssh
      - default-jdk
      - ncurses-bin
      - ncurses-term
      - libncursesw6
      - libtinfo6

    users:
      - default

      - name: user1
        gecos: User 1
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

      - name: user2
        gecos: User 2
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

      - name: user3
        gecos: User 3
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

      - name: user4
        gecos: User 4
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

      - name: user5
        gecos: User 5
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

      - name: user6
        gecos: User 6
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

      - name: user7
        gecos: User 7
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

      - name: user8
        gecos: User 8
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

      - name: user9
        gecos: User 9
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

      - name: user10
        gecos: User 10
        shell: /bin/bash
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
        groups: [sudo, workshop_grp]

    write_files:
      - path: /etc/profile.d/workshop.sh
        permissions: '0755'
        content: |
          #!/bin/bash

          export PATH=/usr/local/bin:/shared/tools:$PATH

          if [ -d /shared/tools/miniforge3/bin ]; then
              export PATH=/shared/tools/miniforge3/bin:$PATH
          fi

          if [ -f /shared/tools/miniforge3/etc/profile.d/conda.sh ]; then
              source /shared/tools/miniforge3/etc/profile.d/conda.sh
          fi

    runcmd:

      # SSH configuration
      - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/60-cloudimg-settings.conf
      # - sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
      # - sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
      - systemctl enable ssh
      - systemctl restart ssh

      # Set passwords
      - |
        for i in $(seq 1 10); do
          echo "user${i}:user${i}" | chpasswd
        done

      # Shared directories
      - mkdir -p /shared/fastq_files
      - mkdir -p /shared/tools
      - mkdir -p /shared/apptainer_images
      - mkdir -p /shared/results
      - mkdir -p /shared/conda-pkgs
      - mkdir -p /shared/conda-envs

      # Ownership
      - chown -R root:workshop_grp /shared

      # Permissions
      - chmod 2755 /shared/fastq_files
      - chmod 2755 /shared/tools
      - chmod 2755 /shared/apptainer_images
      - chmod 2775 /shared/results
      - chmod 2775 /shared/conda-pkgs
      - chmod 2775 /shared/conda-envs

      # ACLs
      - setfacl -m g:workshop_grp:rwx /shared/results
      - setfacl -d -m g:workshop_grp:rwx /shared/results

      - setfacl -R -m g:workshop_grp:rwx /shared/conda-pkgs
      - setfacl -R -d -m g:workshop_grp:rwx /shared/conda-pkgs

      - setfacl -m g:workshop_grp:rwx /shared/conda-envs
      - setfacl -d -m g:workshop_grp:rwx /shared/conda-envs

      # Install Miniforge
      - wget -q https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -O /tmp/miniforge.sh
      - bash /tmp/miniforge.sh -b -p /shared/tools/miniforge3
      - rm -f /tmp/miniforge.sh
      
      ## Conda permissions ONLY installtion during VM built are aloowed
      #- chown -R root:workshop_grp /shared/tools/miniforge3
      #- chown -R root:workshop_grp /shared/conda-pkgs
      #- chmod -R 2775 /shared/tools/miniforge3
      #- chmod -R 2775 /shared/conda-pkgs
      
      # Conda permissions for useer could be install in shred conda env
      - chown -R :workshop_grp /shared/tools/miniforge3
      - chown -R :workshop_grp /shared/conda-pkgs
      - chmod -R g+rwX /shared/tools/miniforge3
      - chmod -R g+rwX /shared/conda-pkgs
      
      # Conda config
      - /shared/tools/miniforge3/bin/conda config --add channels conda-forge
      - /shared/tools/miniforge3/bin/conda config --add channels bioconda
      - /shared/tools/miniforge3/bin/conda config --set channel_priority strict

      # Initialize conda properly
      - /shared/tools/miniforge3/bin/conda config --system --prepend channels conda-forge
      - /shared/tools/miniforge3/bin/conda config --system --append channels bioconda
      
      - /shared/tools/miniforge3/bin/conda config --system --add pkgs_dirs /shared/conda-pkgs
      - /shared/tools/miniforge3/bin/conda config --system --add envs_dirs /shared/conda-env

      # Conda update. It is important to install compatible bioconda pkgs.
      - /shared/tools/miniforge3/bin/conda update --all
      
      # Install bioinformatics tools
      - /shared/tools/miniforge3/bin/conda install -n base -c conda-forge -c bioconda -y fastp
      - /shared/tools/miniforge3/bin/conda install -y -c bioconda iqtree
      - /shared/tools/miniforge3/bin/conda install -y -c bioconda nextflow
      - /shared/tools/miniforge3/bin/conda install -y -c bioconda mafft

      # Nextflow standalone
      - curl -s https://get.nextflow.io -o /shared/tools/nextflow
      - chmod +x /shared/tools/nextflow
      
      # # Reinstall java via conda after nextflow because nextflow install old openjdk11 version
      # this issue is resolved with conda update --all
      # - source /shared/tools/miniforge3/bin/activate
      # - /shared/tools/miniforge3/bin/conda install -c conda-forge "openjdk=21" -y
      
      # install apptainer
      - add-apt-repository -y ppa:apptainer/ppa
      - apt-get update
      - apt-get install -y apptainer
      
      # Add global config so Nextflow auto-uses Apptainer:
      - |
        mkdir -p /etc/nextflow
        cat << 'EOF' > /etc/nextflow/nextflow.config
        process {
          executor = 'local'
          container = 'apptainer'
        }
    
        apptainer {
          enabled = true
        }
        EOF
        
      # force link to libtinfow.so.6
      - ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfow.so.6
      - ldconfig    
           
      # Final permissions
      - chmod +x /etc/profile.d/workshop.sh
      
      # reload workshop.sh
      - echo "source /etc/profile.d/workshop.sh" >> /etc/bash.bashrc

      # Validation logs
      - echo "=== USERS ==="
      - getent passwd | grep user

      - echo "=== SHARED ==="
      - ls -lah /shared

      - echo "=== TOOLS ==="
      - ls -lah /shared/tools

devices:
  eth0:
    type: nic
    name: eth0
    network: lxdbr0
    ipv4.address: 10.5.97.20

  ssh-forward:
    type: proxy
    listen: tcp:192.168.4.64:2222
    connect: tcp:10.5.97.20:22
    nat: "true"


